<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم AGia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-container">
        <img src="Ag.png" class="logo-img" alt="AGia Logo">
        <h1>لوحة تحكم AGia الذكية</h1>
    </div>

    <div class="video-card">
        <textarea id="script-text" placeholder="اكتب السكربت هنا..." rows="4" style="width:90%; padding:10px; border-radius:10px; border:none; margin-bottom:10px;"></textarea>
        
        <select id="voice-select" style="width:95%; padding:10px; border-radius:10px; margin-bottom:15px; background:#1a1a3a; color:white;">
            <option value="ar-SA-HamedNeural">حامد (رجل - فخم)</option>
            <option value="ar-EG-SalmaNeural">سلمى (أنثى - ناعم)</option>
            <option value="ar-EG-ShakirNeural">شاكر (رجل - إخباري)</option>
            <option value="ar-SY-AmanyNeural">أماني (أنثى - هادئ)</option>
        </select>

        <button class="btn-tool" style="width:100%; background:#4facfe;" onclick="updateTask()">🚀 تحديث وإنتاج الفيديو</button>
        <p id="status" style="color: #4facfe; margin-top: 10px;"></p>
    </div>

    <script>
        function updateTask() {
            const text = document.getElementById('script-text').value;
            const voice = document.getElementById('voice-select').value;
            document.getElementById('status').innerText = "تم حفظ الإعدادات! بانتظار تشغيل 'agia' في Termux...";
            
            // هنا سيتم طباعة القيم في Console، في المرحلة الاحترافية سنربطها بـ API
            console.log("Task Saved:", { text, voice });
            alert("تم تحديث السكربت محلياً. يرجى كتابة 'agia' في هاتفك الآن.");
        }
    </script>
</body>
</html>
