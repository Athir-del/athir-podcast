<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚽ كورة لايف — نتائج مباشرة</title>
<meta name="google-adsense-account" content="ca-pub-7535354659763641">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7535354659763641" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#03040f;color:#fff;min-height:100vh;direction:rtl}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:radial-gradient(ellipse at 30% 50%,rgba(0,200,83,.06),transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(41,121,255,.05),transparent 60%)}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:12px}

nav{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:13px;margin-bottom:16px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#00c853,#2979ff);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.logo-text{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#00c853,#2979ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.live-badge{display:flex;align-items:center;gap:5px;padding:5px 10px;background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.2);border-radius:20px;font-size:.72rem;color:#ff4444;font-weight:700}
.live-dot{width:6px;height:6px;background:#ff4444;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;cursor:pointer;font-size:.8rem;color:#667;white-space:nowrap;font-family:'Tajawal',sans-serif;transition:.3s;flex-shrink:0}
.tab.on{background:rgba(0,200,83,.12);border-color:rgba(0,200,83,.3);color:#00c853;font-weight:700}

.pnl{display:none}
.pnl.on{display:block}

.league-header{display:flex;align-items:center;gap:10px;padding:12px 15px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;margin-bottom:8px}
.league-flag{font-size:1.5rem}
.league-name{font-weight:700;font-size:.9rem}
.league-count{margin-right:auto;font-size:.72rem;color:#556;background:rgba(255,255,255,.05);padding:3px 8px;border-radius:10px}

.match-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:8px;transition:.3s}
.match-card:hover{background:rgba(255,255,255,.04);border-color:rgba(0,200,83,.2)}
.match-time{font-size:.68rem;color:#556;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.match-live{background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.2);color:#ff4444;padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:700}
.match-finished{background:rgba(255,255,255,.05);color:#667;padding:2px 7px;border-radius:10px;font-size:.65rem}
.match-scheduled{background:rgba(41,121,255,.1);border:1px solid rgba(41,121,255,.2);color:#2979ff;padding:2px 7px;border-radius:10px;font-size:.65rem}
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:8px}
.team{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
.team-name{font-size:.78rem;font-weight:700;text-align:center;line-height:1.3}
.team-logo{font-size:1.8rem}
.score{display:flex;align-items:center;gap:8px;flex-shrink:0}
.score-num{font-size:1.8rem;font-weight:900;min-width:28px;text-align:center}
.score-sep{color:#334;font-size:1.2rem}
.score-vs{font-size:.85rem;color:#556;padding:0 8px}

.standings-table{width:100%;border-collapse:collapse}
.standings-table th{color:#556;font-size:.7rem;padding:8px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
.standings-table th:first-child{text-align:right}
.standings-table td{padding:10px 5px;text-align:center;font-size:.78rem;border-bottom:1px solid rgba(255,255,255,.03)}
.standings-table td:first-child{text-align:right;display:flex;align-items:center;gap:8px}
.pos{width:20px;color:#556;font-size:.7rem}
.team-row-name{font-weight:700}
.pts{font-weight:900;color:#00c853}
.zone-cl{background:rgba(41,121,255,.08)}
.zone-rel{background:rgba(255,64,129,.08)}

.loader{text-align:center;padding:40px;color:#556}
.spin{display:inline-block;width:30px;height:30px;border:3px solid rgba(0,200,83,.2);border-top-color:#00c853;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{text-align:center;padding:30px;color:#556}

footer{text-align:center;padding:16px;color:#334;font-size:.7rem;border-top:1px solid rgba(255,255,255,.07);margin-top:10px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">

<nav>
  <div class="logo">
    <div class="logo-icon">⚽</div>
    <div class="logo-text">كورة لايف</div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>مباشر</div>
</nav>

<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7535354659763641" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>

<div class="tabs">
  <button class="tab on" onclick="showTab('today',this)">📅 اليوم</button>
  <button class="tab" onclick="showTab('live',this)">🔴 مباشر</button>
  <button class="tab" onclick="showTab('pl',this)">🏴󠁧󠁢󠁥󠁮󠁧󠁿 بريميرليغ</button>
  <button class="tab" onclick="showTab('laliga',this)">🇪🇸 لاليغا</button>
  <button class="tab" onclick="showTab('ucl',this)">🏆 أبطال أوروبا</button>
  <button class="tab" onclick="showTab('bundesliga',this)">🇩🇪 بوندسليغا</button>
</div>

<div id="pnl-today" class="pnl on"><div class="loader"><div class="spin"></div><br>جاري التحميل...</div></div>
<div id="pnl-live" class="pnl"><div class="loader"><div class="spin"></div><br>جاري التحميل...</div></div>
<div id="pnl-pl" class="pnl"><div class="loader"><div class="spin"></div><br>جاري التحميل...</div></div>
<div id="pnl-laliga" class="pnl"><div class="loader"><div class="spin"></div><br>جاري التحميل...</div></div>
<div id="pnl-ucl" class="pnl"><div class="loader"><div class="spin"></div><br>جاري التحميل...</div></div>
<div id="pnl-bundesliga" class="pnl"><div class="loader"><div class="spin"></div><br>جاري التحميل...</div></div>

<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7535354659763641" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>

<footer>⚽ كورة لايف © 2026 — نتائج مباشرة</footer>
</div>

<script>
const leagues={
  pl:{id:2021,name:'بريميرليغ',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  laliga:{id:2014,name:'لاليغا',flag:'🇪🇸'},
  ucl:{id:2001,name:'أبطال أوروبا',flag:'🏆'},
  bundesliga:{id:2002,name:'بوندسليغا',flag:'🇩🇪'},
  seriea:{id:2019,name:'سيريا A',flag:'🇮🇹'},
  ligue1:{id:2015,name:'ليغ 1',flag:'🇫🇷'}
};

const loaded={};

function showTab(n,el){
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('pnl-'+n).classList.add('on');
  el.classList.add('on');
  if(!loaded[n])loadData(n);
}

async function loadData(tab){
  loaded[tab]=true;
  const pnl=document.getElementById('pnl-'+tab);

  try{
    let data;
    if(tab==='today'){
      const today=new Date().toISOString().split('T')[0];
      const r=await fetch(`/api/football?endpoint=matches?dateFrom=${today}&dateTo=${today}`);
      data=await r.json();
      pnl.innerHTML=renderMatches(data.matches||[]);
    }else if(tab==='live'){
      const r=await fetch('/api/football?endpoint=matches?status=IN_PLAY,PAUSED');
      data=await r.json();
      const matches=data.matches||[];
      if(matches.length===0){
        pnl.innerHTML='<div class="error-box">⚽ لا توجد مباريات مباشرة الآن</div>';
      }else{
        pnl.innerHTML=renderMatches(matches);
      }
    }else{
      const lid=leagues[tab]?.id;
      if(!lid)return;
      const r=await fetch(`/api/football?endpoint=competitions/${lid}/matches?status=SCHEDULED,IN_PLAY,FINISHED&limit=20`);
      data=await r.json();
      pnl.innerHTML=renderMatches(data.matches||[]);
    }
  }catch(e){
    pnl.innerHTML=`<div class="error-box">❌ خطأ في التحميل<br><small>${e.message}</small></div>`;
  }
}

function renderMatches(matches){
  if(!matches||matches.length===0) return '<div class="error-box">⚽ لا توجد مباريات</div>';

  const grouped={};
  matches.forEach(m=>{
    const comp=m.competition?.name||'دوري';
    if(!grouped[comp])grouped[comp]=[];
    grouped[comp].push(m);
  });

  let html='';
  for(const [comp,ms] of Object.entries(grouped)){
    html+=`<div class="league-header"><div class="league-flag">⚽</div><div class="league-name">${comp}</div><div class="league-count">${ms.length} مباراة</div></div>`;
    ms.forEach(m=>{
      const status=getStatus(m);
      const home=m.homeTeam?.shortName||m.homeTeam?.name||'الفريق المحلي';
      const away=m.awayTeam?.shortName||m.awayTeam?.name||'الفريق الضيف';
      const hScore=m.score?.fullTime?.home??m.score?.halfTime?.home??'-';
      const aScore=m.score?.fullTime?.away??m.score?.halfTime?.away??'-';
      const time=new Date(m.utcDate).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});

      html+=`
      <div class="match-card">
        <div class="match-time">
          🕐 ${time}
          <span class="${status.cls}">${status.txt}</span>
        </div>
        <div class="match-teams">
          <div class="team">
            <div class="team-logo">🏠</div>
            <div class="team-name">${home}</div>
          </div>
          <div class="score">
            ${m.status==='SCHEDULED'?
              '<div class="score-vs">vs</div>':
              `<div class="score-num">${hScore}</div><div class="score-sep">-</div><div class="score-num">${aScore}</div>`
            }
          </div>
          <div class="team">
            <div class="team-logo">✈️</div>
            <div class="team-name">${away}</div>
          </div>
        </div>
      </div>`;
    });
  }
  return html;
}

function getStatus(m){
  switch(m.status){
    case 'IN_PLAY':return{cls:'match-live',txt:'🔴 مباشر'};
    case 'PAUSED':return{cls:'match-live',txt:'⏸️ استراحة'};
    case 'FINISHED':return{cls:'match-finished',txt:'✅ انتهت'};
    case 'SCHEDULED':return{cls:'match-scheduled',txt:'🕐 قادمة'};
    default:return{cls:'match-finished',txt:m.status};
  }
}

// Load today on start
loadData('today');

// Auto refresh every 60 seconds
setInterval(()=>{
  const active=document.querySelector('.tab.on');
  const tab=active?.onclick?.toString().match(/'(\w+)'/)?.[1];
  if(tab){
    loaded[tab]=false;
    loadData(tab);
  }
},60000);
</script>
</body>
</html>
