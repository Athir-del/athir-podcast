<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أثير - بوت البودكاست</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Arial', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    h1 { font-size: 2rem; color: #00ff88; margin-bottom: 10px; }
    p { color: #aaa; margin-bottom: 30px; }
    textarea { width: 100%; max-width: 600px; height: 200px; background: #1a1a1a; border: 1px solid #00ff88; color: #fff; padding: 15px; border-radius: 10px; font-size: 1rem; resize: none; direction: rtl; }
    button { margin-top: 15px; padding: 12px 40px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    button:hover { background: #00cc66; }
    #result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 10px; max-width: 600px; width: 100%; display: none; }
  </style>
</head>
<body>
  <h1>🎙️ أثير - بوت البودكاست</h1>
  <p>اكتب السكريبت وسنحوله لبودكاست احترافي</p>
  <textarea id="script" placeholder="اكتب سكريبت البودكاست هنا..."></textarea>
  <button onclick="generate()">🚀 توليد البودكاست</button>
  <div id="result"></div>

  <script>
    async function generate() {
      const script = document.getElementById('script').value;
      if (!script) return alert('اكتب السكريبت أولاً!');
      
      document.getElementById('result').style.display = 'block';
      document.getElementById('result').innerHTML = '⏳ جاري التوليد...';
      
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ script })
      });
      const data = await res.json();
      document.getElementById('result').innerHTML = '✅ ' + data.message;
    }
  </script>
</body>
</html>
