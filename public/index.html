<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أثير - بوت البودكاست</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#050510;color:#fff;min-height:100vh;padding:20px}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,#0d0d3d,transparent 60%),radial-gradient(ellipse at 80% 20%,#0a1a4a,transparent 60%);z-index:0}
.container{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:40px 20px}
.logo{text-align:center;font-size:3rem;font-weight:900;background:linear-gradient(135deg,#4488ff,#00ffcc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.tagline{text-align:center;color:#8899bb;margin-bottom:5px}
.badge{display:block;text-align:center;color:#4488ff;margin-bottom:40px}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:30px}
.step{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;text-align:center}
.step:hover{background:rgba(68,136,255,.08);border-color:rgba(68,136,255,.3)}
.step-icon{font-size:2rem;margin-bottom:8px}
.step-title{font-weight:700;margin-bottom:4px}
.step-desc{font-size:.8rem;color:#667}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:35px}
.card-label{color:#4488ff;font-weight:700;margin-bottom:10px}
textarea{width:100%;height:180px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);color:#fff;padding:15px;border-radius:14px;font-size:1rem;resize:none;direction:rtl;outline:none;font-family:Arial}
textarea:focus{border-color:rgba(68,136,255,.5)}
.buttons{display:flex;gap:12px;margin-top:15px}
.btn-primary{flex:1;padding:14px;background:linear-gradient(135deg,#2255dd,#0099ff);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{padding:14px 20px;background:rgba(255,255,255,.05);color:#aab;border:1px solid rgba(255,255,255,.1);border-radius:12px;cursor:pointer}
.loading{display:none;text-align:center;padding:30px;color:#4488ff}
.spinner{width:40px;height:40px;border:3px solid rgba(68,136,255,.2);border-top-color:#4488ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 15px}
@keyframes spin{to{transform:rotate(360deg)}}
.result{margin-top:25px;display:none}
.result-header{color:#00ffcc;font-weight:700;margin-bottom:12px}
.result-box{background:rgba(0,255,150,.05);border:1px solid rgba(0,255,150,.15);border-radius:14px;padding:20px;color:#ccddcc;line-height:1.9;white-space:pre-wrap}
.copy-btn{margin-top:12px;padding:10px 20px;background:rgba(0,255,150,.1);border:1px solid rgba(0,255,150,.2);color:#00ffcc;border-radius:10px;cursor:pointer}
.footer{text-align:center;margin-top:40px;color:#334;font-size:.85rem}
@media(max-width:600px){.steps{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
<div class="logo">🎙️ أثير</div>
<div class="tagline">منصة البودكاست بالذكاء الاصطناعي</div>
<div class="badge">✨ مجاني تماماً</div>
<div class="steps">
<div class="step"><div class="step-icon">✍️</div><div class="step-title">اكتب السكريبت</div><div class="step-desc">أدخل أفكارك أو موضوع الحلقة</div></div>
<div class="step"><div class="step-icon">🤖</div><div class="step-title">يحسّنه الذكاء الاصطناعي</div><div class="step-desc">يحوله لسكريبت احترافي</div></div>
<div class="step"><div class="step-icon">🚀</div><div class="step-title">انشره فوراً</div><div class="step-desc">جاهز لليوتيوب والبودكاست</div></div>
</div>
<div class="card">
<div class="card-label">📝 السكريبت</div>
<textarea id="script" placeholder="اكتب موضوع حلقتك هنا..."></textarea>
<div class="buttons">
<button class="btn-primary" onclick="generate()" id="generateBtn">🚀 توليد السكريبت الاحترافي</button>
<button class="btn-secondary" onclick="document.getElementById('script').value='';document.getElementById('result').style.display='none'">🗑️ مسح</button>
</div>
<div class="loading" id="loading"><div class="spinner"></div><div>جاري التوليد...</div></div>
<div class="result" id="result">
<div class="result-header">✅ السكريبت جاهز</div>
<div class="result-box" id="resultText"></div>
<button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('resultText').textContent);alert('تم النسخ!')">📋 نسخ</button>
</div>
</div>
<div class="footer">أثير © 2026 — مدعوم بالذكاء الاصطناعي</div>
</div>
<script>
async function generate(){
const script=document.getElementById('script').value;
if(!script.trim())return alert('اكتب السكريبت أولاً!');
document.getElementById('generateBtn').disabled=true;
document.getElementById('loading').style.display='block';
document.getElementById('result').style.display='none';
try{
const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({script})});
const data=await res.json();
document.getElementById('resultText').textContent=data.result||data.error;
document.getElementById('result').style.display='block';
}catch(err){alert('خطأ في الاتصال!');}
finally{document.getElementById('loading').style.display='none';document.getElementById('generateBtn').disabled=false;}
}
</script>
</body>
</html>
