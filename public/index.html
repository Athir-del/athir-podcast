<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>أثير AI — وكيلك الذكي</title>
<meta name="google-adsense-account" content="ca-pub-7535354659763641">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7535354659763641" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2979ff;--cyan:#00e5ff;--purple:#7c4dff;--green:#00e676;--bg:#03040f;--border:rgba(255,255,255,.07)}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:#fff;min-height:100vh;direction:rtl;overflow-x:hidden}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.08;background-size:cover;background-position:center}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:linear-gradient(135deg,rgba(3,4,15,.97),rgba(5,10,30,.95))}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;margin-bottom:15px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.logo-text{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-right{display:flex;gap:8px;align-items:center}
.counter{padding:5px 10px;background:rgba(41,121,255,.1);border:1px solid rgba(41,121,255,.2);color:var(--blue);border-radius:8px;font-size:.75rem}
.upgrade-btn{padding:7px 14px;background:linear-gradient(135deg,#ffd700,#ff6d00);color:#000;border:none;border-radius:8px;font-size:.78rem;font-weight:900;cursor:pointer;font-family:'Tajawal',sans-serif}

/* CHAT */
.chat-box{flex:1;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:12px;min-height:400px;max-height:500px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.chat-box::-webkit-scrollbar{width:4px}
.chat-box::-webkit-scrollbar-thumb{background:rgba(41,121,255,.3);border-radius:2px}

/* Messages */
.msg{display:flex;gap:8px;align-items:flex-start;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{flex-direction:row}
.msg.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.bot .avatar{background:linear-gradient(135deg,var(--blue),var(--cyan))}
.user .avatar{background:linear-gradient(135deg,var(--purple),#9c27b0)}
.bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.7}
.bot .bubble{background:rgba(41,121,255,.1);border:1px solid rgba(41,121,255,.2);border-radius:14px 14px 14px 0}
.user .bubble{background:rgba(124,77,255,.15);border:1px solid rgba(124,77,255,.25);border-radius:14px 14px 0 14px;text-align:right}

/* Quick Actions */
.quick-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.qb{padding:7px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:.78rem;color:#aab;font-family:'Tajawal',sans-serif;transition:.3s;white-space:nowrap}
.qb:hover{background:rgba(41,121,255,.1);border-color:rgba(41,121,255,.3);color:var(--blue)}

/* Result Card */
.result-card{background:rgba(0,0,0,.4);border:1px solid rgba(0,230,118,.15);border-radius:12px;padding:14px;margin-top:8px}
.result-card audio,.result-card video{width:100%;border-radius:8px;margin-top:8px}
.result-card img{width:100%;border-radius:8px;margin-top:8px}
.result-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ra{padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.75rem;font-family:'Tajawal',sans-serif;border:1px solid;transition:.3s}
.ra.g{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.2);color:var(--green)}
.ra.b{background:rgba(41,121,255,.08);border-color:rgba(41,121,255,.2);color:var(--blue)}
.ra.p{background:rgba(124,77,255,.08);border-color:rgba(124,77,255,.2);color:var(--purple)}

/* Typing */
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.td{width:6px;height:6px;background:var(--blue);border-radius:50%;animation:td .8s ease-in-out infinite}
.td:nth-child(2){animation-delay:.15s}
.td:nth-child(3){animation-delay:.3s}
@keyframes td{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:1}}

/* Input */
.input-area{display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:10px 14px;display:flex;align-items:flex-end;gap:8px}
.input-wrap textarea{flex:1;background:transparent;border:none;color:#fff;font-size:.9rem;direction:rtl;font-family:'Tajawal',sans-serif;outline:none;resize:none;max-height:100px;line-height:1.6}
.input-wrap textarea::placeholder{color:#334}
.send-btn{width:40px;height:40px;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;transition:.3s}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Upgrade Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;padding:15px}
.mbox{background:#080d20;border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:25px;text-align:center;max-width:380px;width:100%}
.mbox-icon{font-size:3rem;margin-bottom:10px}
.mbox-title{font-size:1.2rem;font-weight:900;margin-bottom:8px}
.mbox-sub{color:#556;font-size:.82rem;line-height:1.7;margin-bottom:20px}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}
.plan{border-radius:12px;padding:14px;text-align:center;border:1px solid}
.plan.free{background:rgba(255,255,255,.03);border-color:var(--border)}
.plan.pro{background:linear-gradient(135deg,rgba(41,121,255,.1),rgba(0,229,255,.05));border-color:rgba(41,121,255,.3)}
.plan-price{font-size:1.5rem;font-weight:900;margin:5px 0}
.plan-features{font-size:.7rem;color:#667;line-height:1.8;text-align:right}
.plan-btn{width:100%;padding:9px;border:none;border-radius:8px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;margin-top:10px}
.close-modal{padding:10px 20px;background:rgba(255,255,255,.05);color:#889;border:1px solid var(--border);border-radius:9px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.82rem;width:100%}

footer{text-align:center;padding:15px;color:#334;font-size:.72rem;border-top:1px solid var(--border);margin-top:10px}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="ov"></div>

<div class="wrap">
<nav>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">أثير AI</div>
  </div>
  <div class="nav-right">
    <div class="counter" id="counter">🎯 3/3</div>
    <button class="upgrade-btn" onclick="showUpgrade()">💎 ترقية</button>
  </div>
</nav>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" placeholder="اكتب موضوعك هنا..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
  </div>
  <button class="send-btn" onclick="sendMsg()" id="sendBtn">➤</button>
</div>

<!-- UPGRADE MODAL -->
<div class="modal" id="upgradeModal">
  <div class="mbox">
    <div class="mbox-icon">💎</div>
    <div class="mbox-title">ترقّ للخطة Pro</div>
    <div class="mbox-sub">احصل على توليدات غير محدودة وميزات احترافية!</div>
    <div class="plans">
      <div class="plan free">
        <div style="font-size:1.2rem">🆓</div>
        <div style="font-weight:700;margin:4px 0">مجاني</div>
        <div class="plan-price" style="color:var(--green);font-size:1.2rem">$0</div>
        <div class="plan-features">✅ 3 يومياً<br>✅ بودكاست<br>✅ صور<br>❌ فيديو<br>❌ صوت</div>
        <button class="plan-btn" style="background:rgba(255,255,255,.05);color:#fff" onclick="document.getElementById('upgradeModal').style.display='none'">الخطة الحالية</button>
      </div>
      <div class="plan pro">
        <div style="font-size:1.2rem">⭐</div>
        <div style="font-weight:700;margin:4px 0">Pro</div>
        <div class="plan-price" style="color:var(--cyan)">$5<span style="font-size:.75rem;color:#556">/شهر</span></div>
        <div class="plan-features">✅ غير محدود<br>✅ فيديو AI<br>✅ صوت احترافي<br>✅ صور HD<br>✅ أولوية</div>
        <a href="https://athirstore.lemonsqueezy.com" target="_blank"><button class="plan-btn" style="background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff">🚀 اشترك</button></a>
      </div>
    </div>
    <button class="close-modal" onclick="document.getElementById('upgradeModal').style.display='none'">لاحقاً</button>
  </div>
</div>

<footer>
  <a href="https://youtube.com/@al-u6j4s" target="_blank" style="color:#ff4444;text-decoration:none;margin-left:10px">▶️ يوتيوب</a>
  <a href="https://athir-fun.vercel.app" target="_blank" style="color:#ff4081;text-decoration:none">😂 أثير Fun</a>
  &nbsp;|&nbsp; أثير AI © 2026
</footer>
</div>

<script>
const LIMIT=3;
let step='start';
let pendingText='';
let voiceVal='male-arabic';
let styleVal='تقني';

// BG
const bgs=['https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=1920&q=80','https://images.unsplash.com/photo-1478737270239-2f02b77fc618?w=1920&q=80'];
let bi=0;
function chBg(){document.getElementById('bg').style.backgroundImage=`url(${bgs[bi]})`;bi=(bi+1)%bgs.length;}
chBg();setInterval(chBg,10000);

// Limit
function chkLmt(){
  if(localStorage.getItem('dev')==='1')return true;
  const t=new Date().toDateString(),d=JSON.parse(localStorage.getItem('a')||'{}');
  if(d.d!==t){localStorage.setItem('a',JSON.stringify({d:t,c:0}));updC();return true;}
  if(d.c>=LIMIT){showUpgrade();return false;}
  return true;
}
function incC(){
  if(localStorage.getItem('dev')==='1')return;
  const t=new Date().toDateString(),d=JSON.parse(localStorage.getItem('a')||'{}');
  const c=(d.d===t?d.c:0)+1;
  localStorage.setItem('a',JSON.stringify({d:t,c}));updC();
}
function updC(){
  if(localStorage.getItem('dev')==='1'){document.getElementById('counter').textContent='🔓 مطور';return;}
  const t=new Date().toDateString(),d=JSON.parse(localStorage.getItem('a')||'{}');
  const r=LIMIT-(d.d===t?d.c:0);
  document.getElementById('counter').textContent=`🎯 ${r}/${LIMIT}`;
}
function showUpgrade(){document.getElementById('upgradeModal').style.display='flex';}
function devMode(){const c=prompt('كود:');if(c==='athir2026'){localStorage.setItem('dev','1');alert('✅');updC();}else alert('❌');}

// Chat
function addMsg(text,type,extra){
  const box=document.getElementById('chatBox');
  const msg=document.createElement('div');
  msg.className='msg '+type;
  const icon=type==='bot'?'🤖':'👤';
  msg.innerHTML=`
    <div class="avatar">${icon}</div>
    <div>
      <div class="bubble">${text}</div>
      ${extra||''}
    </div>`;
  box.appendChild(msg);
  box.scrollTop=box.scrollHeight;
}

function addTyping(){
  const box=document.getElementById('chatBox');
  const div=document.createElement('div');
  div.className='msg bot';
  div.id='typing';
  div.innerHTML=`<div class="avatar">🤖</div><div class="bubble typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing');
  if(t)t.remove();
}

function addQuickBtns(btns){
  const box=document.getElementById('chatBox');
  const div=document.createElement('div');
  div.className='msg bot';
  div.id='quickBtns';
  const btnHtml=btns.map(b=>`<button class="qb" onclick="${b.action}">${b.label}</button>`).join('');
  div.innerHTML=`<div class="avatar">🤖</div><div><div class="quick-btns">${btnHtml}</div></div>`;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function removeQuickBtns(){
  const q=document.getElementById('quickBtns');
  if(q)q.remove();
}

// Send Message
async function sendMsg(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  input.style.height='auto';
  
  addMsg(text,'user');
  removeQuickBtns();
  
  if(step==='start'){
    pendingText=text;
    step='choose_type';
    addTyping();
    await delay(1000);
    removeTyping();
    addMsg('ممتاز! 🎉 ماذا تريد أن أصنع من هذا الموضوع؟','bot');
    addQuickBtns([
      {label:'🎙️ بودكاست',action:'chooseType("podcast")'},
      {label:'🎬 فيديو',action:'chooseType("video")'},
      {label:'🎨 صورة',action:'chooseType("image")'},
      {label:'📝 سكريبت فقط',action:'chooseType("script")'}
    ]);
  }
}

async function chooseType(type){
  if(!chkLmt())return;
  removeQuickBtns();
  
  const labels={podcast:'🎙️ بودكاست',video:'🎬 فيديو',image:'🎨 صورة',script:'📝 سكريبت'};
  addMsg(labels[type],'user');
  
  if(type==='podcast'){
    addTyping();
    await delay(800);
    removeTyping();
    addMsg('اختر الصوت المناسب 🎙️','bot');
    addQuickBtns([
      {label:'👨 رجل عربي',action:'chooseVoice("male-arabic")'},
      {label:'👩 امرأة عربية',action:'chooseVoice("female-arabic")'},
      {label:'🔥 شباب حماسي',action:'chooseVoice("youth-energetic")'},
      {label:'🎩 رسمي',action:'chooseVoice("professional")'}
    ]);
  } else if(type==='video'){
    addTyping();
    await delay(800);
    removeTyping();
    addMsg('سأولّد فيديو احترافي الآن... 🎬','bot');
    await genVideo();
  } else if(type==='image'){
    addTyping();
    await delay(800);
    removeTyping();
    addMsg('سأولّد صورة احترافية الآن... 🎨','bot');
    await genImage();
  } else if(type==='script'){
    await genScript();
  }
}

async function chooseVoice(voice){
  voiceVal=voice;
  removeQuickBtns();
  const vl={'male-arabic':'👨 رجل عربي','female-arabic':'👩 امرأة عربية','youth-energetic':'🔥 شباب حماسي','professional':'🎩 رسمي'};
  addMsg(vl[voice],'user');
  await genPodcast();
}

// Generate Script
async function genScript(){
  if(!chkLmt())return;
  addTyping();
  try{
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({script:pendingText+' (تقني)'})});
    const d=await r.json();
    removeTyping();
    const txt=d.result||d.error;
    addMsg('✅ السكريبت جاهز!','bot',`
      <div class="result-card">
        <div style="color:#bcd;font-size:.82rem;line-height:1.9;white-space:pre-wrap;max-height:200px;overflow-y:auto">${txt}</div>
        <div class="result-actions">
          <button class="ra g" onclick="navigator.clipboard.writeText(\`${txt.replace(/`/g,'')}\`);alert('تم!')">📋 نسخ</button>
          <button class="ra b" onclick="dlTxt(\`${txt.replace(/`/g,'')}\`)">💾 تحميل</button>
        </div>
      </div>`);
    incC();
    step='start';
    await delay(1000);
    addMsg('هل تريد شيئاً آخر؟ 😊','bot');
    addQuickBtns([
      {label:'🎙️ بودكاست جديد',action:'resetChat()'},
      {label:'🎨 صورة',action:'resetToImage()'},
      {label:'😂 أثير Fun',action:'window.open(\"https://athir-fun.vercel.app\")'}
    ]);
  }catch(e){removeTyping();addMsg('حدث خطأ! حاول مجدداً 😕','bot');}
}

// Generate Podcast
async function genPodcast(){
  if(!chkLmt())return;
  addTyping();
  try{
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({script:pendingText})});
    const d=await r.json();
    const txt=d.result||d.error;
    removeTyping();
    addMsg('✅ السكريبت جاهز! جاري توليد الصوت... 🎙️','bot');
    addTyping();
    
    const ar=await fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt.substring(0,500),voice:voiceVal})});
    removeTyping();
    
    if(ar.ok){
      const blob=await ar.blob();
      const url=URL.createObjectURL(blob);
      addMsg('🎙️ البودكاست جاهز!','bot',`
        <div class="result-card">
          <audio controls src="${url}"></audio>
          <div style="color:#bcd;font-size:.78rem;margin-top:8px;max-height:150px;overflow-y:auto;white-space:pre-wrap">${txt.substring(0,200)}...</div>
          <div class="result-actions">
            <button class="ra g" onclick="navigator.clipboard.writeText(\`${txt.replace(/`/g,'')}\`);alert('تم!')">📋 نسخ</button>
            <button class="ra b" onclick="dlTxt(\`${txt.replace(/`/g,'')}\`)">💾 نص</button>
          </div>
        </div>`);
    } else {
      addMsg('✅ السكريبت جاهز! (الصوت يحتاج اشتراك Pro)','bot',`
        <div class="result-card">
          <div style="color:#bcd;font-size:.82rem;line-height:1.9;white-space:pre-wrap;max-height:200px;overflow-y:auto">${txt}</div>
          <div class="result-actions">
            <button class="ra g" onclick="navigator.clipboard.writeText(\`${txt.replace(/`/g,'')}\`);alert('تم!')">📋 نسخ</button>
            <button class="ra p" onclick="showUpgrade()">⭐ Pro للصوت</button>
          </div>
        </div>`);
    }
    incC();
    step='start';
    await delay(1000);
    addMsg('رائع! هل تريد شيئاً آخر؟ 🚀','bot');
    addQuickBtns([
      {label:'🔄 موضوع جديد',action:'resetChat()'},
      {label:'🎨 صورة',action:'resetToImage()'},
      {label:'💎 ترقية',action:'showUpgrade()'}
    ]);
  }catch(e){removeTyping();addMsg('حدث خطأ! حاول مجدداً 😕','bot');}
}

// Generate Video
async function genVideo(){
  addTyping();
  try{
    const r=await fetch('/api/video',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:pendingText})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    removeTyping();
    addMsg('⏳ جاري توليد الفيديو... سيستغرق 2-3 دقائق 🎬','bot');
    
    const chk=setInterval(async()=>{
      const s=await fetch('/api/video-status?id='+d.id);
      const sd=await s.json();
      if(sd.status==='succeeded'||sd.status==='SUCCEEDED'){
        clearInterval(chk);
        const out=Array.isArray(sd.output)?sd.output[0]:sd.output;
        addMsg('🎬 الفيديو جاهز!','bot',`
          <div class="result-card">
            <video controls src="${out}"></video>
            <div class="result-actions">
              <button class="ra g" onclick="const a=document.createElement('a');a.href='${out}';a.download='athir.mp4';a.click()">💾 تحميل</button>
              <button class="ra b" onclick="resetChat()">🔄 جديد</button>
            </div>
          </div>`);
        incC();
        step='start';
      }else if(sd.status==='failed'||sd.status==='FAILED'){
        clearInterval(chk);
        addMsg('فشل التوليد 😕 حاول مجدداً','bot');
        step='start';
      }
    },5000);
  }catch(e){
    removeTyping();
    addMsg('الفيديو يحتاج اشتراك Pro 💎','bot',`
      <div class="result-card">
        <div style="color:#556;font-size:.82rem;margin-bottom:10px">اشترك للحصول على فيديوهات AI احترافية بـ Runway ML</div>
        <button class="ra p" onclick="showUpgrade()" style="width:100%;padding:10px;text-align:center">⭐ اشترك بـ $5/شهر</button>
      </div>`);
  }
}

// Generate Image
async function genImage(){
  addTyping();
  const img=new Image();
  const prompt=encodeURIComponent(pendingText+', professional, high quality');
  img.onload=()=>{
    removeTyping();
    addMsg('🎨 الصورة جاهزة!','bot',`
      <div class="result-card">
        <img src="${img.src}" style="width:100%;border-radius:8px">
        <div class="result-actions">
          <button class="ra g" onclick="const a=document.createElement('a');a.href='${img.src}';a.download='athir.jpg';a.click()">💾 تحميل</button>
          <button class="ra b" onclick="genImage()">🔄 جديد</button>
        </div>
      </div>`);
    incC();
    step='start';
  };
  img.onerror=()=>{removeTyping();addMsg('خطأ في التوليد 😕','bot');};
  img.src=`https://image.pollinations.ai/prompt/${prompt}?width=800&height=450&nologo=true&seed=${Date.now()}`;
}

// Utils
function resetChat(){
  step='start';
  pendingText='';
  addMsg('أهلاً من جديد! 😊 أخبرني بموضوعك وسأساعدك فوراً','bot');
}

function resetToImage(){
  step='start';
  addMsg('اكتب وصف الصورة التي تريدها 🎨','bot');
  step='image_direct';
}

function dlTxt(txt){
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
  a.download='athir.txt';
  a.click();
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

async function quickStart(text){
  removeQuickBtns();
  addMsg(text,'user');
  pendingText=text;
  step='choose_type';
  addTyping();
  await delay(800);
  removeTyping();
  addMsg('موضوع رائع! 🎉 ماذا تريد أن أصنع؟','bot');

    {label:'🎙️ بودكاست',action:'chooseType("podcast")'},
    {label:'🎬 فيديو',action:'chooseType("video")'},
