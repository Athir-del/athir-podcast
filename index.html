<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثير كورة - نتائج حية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #00ff88; text-shadow: 2px 2px 4px #000; }
        #matches-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .match-card { background: #2d2d2d; border-left: 5px solid #00ff88; border-radius: 8px; padding: 15px; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .match-card:hover { transform: translateY(-5px); }
        .league { font-size: 0.8em; color: #aaa; margin-bottom: 10px; display: block; }
        .teams { font-weight: bold; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        .score { background: #00ff88; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 1.2em; }
        .status { font-size: 0.8em; margin-top: 10px; color: #00ff88; }
    </style>
</head>
<body>
    <h1>⚽ أثير كورة - نتائج حية</h1>
    <div id="matches-container">جاري جلب أحدث النتائج...</div>
    <script src="script.js"></script>
</body>
</html>
